name: Auto Changelog

on:
  push:
    branches: [main]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Extract commits and send to changelog
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CHANGELOG_WEBHOOK_SECRET: ${{ secrets.CHANGELOG_WEBHOOK_SECRET }}
          # Fallback to the known public Supabase project URL if the GitHub
          # secret SUPABASE_URL is missing or empty. SUPABASE_URL is the
          # public project URL, not a sensitive credential.
          SUPABASE_URL_FALLBACK: "https://dmwyqyqaseyuybqfawvk.supabase.co"
          # Pass GitHub event data through env vars to avoid shell-injection
          # and quoting issues when commit messages contain quotes / backticks / $.
          COMMITS_RAW: ${{ toJson(github.event.commits) }}
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Guard: no commits in payload (e.g. tag push, branch delete)
          if [ -z "${COMMITS_RAW:-}" ] || [ "$COMMITS_RAW" = "null" ]; then
            echo "No commits in push event, skipping."
            exit 0
          fi

          # Build commits JSON array safely from env var
          COMMITS_JSON=$(printf '%s' "$COMMITS_RAW" | jq -c '[.[] | {message: .message, author: .author.name}]')

          if [ "$COMMITS_JSON" = "[]" ]; then
            echo "Empty commits array, skipping."
            exit 0
          fi

          # Extract version from tag if present
          VERSION=""
          case "$GIT_REF" in
            refs/tags/v*)
              VERSION="${GIT_REF_NAME#v}"
              ;;
          esac

          # Build payload
          if [ -n "$VERSION" ]; then
            PAYLOAD=$(jq -n --argjson commits "$COMMITS_JSON" --arg version "$VERSION" '{commits: $commits, version: $version}')
          else
            PAYLOAD=$(jq -n --argjson commits "$COMMITS_JSON" '{commits: $commits}')
          fi

          # Resolve base URL: prefer GitHub secret, fall back to the project URL.
          BASE_URL="${SUPABASE_URL:-}"
          if [ -z "$BASE_URL" ]; then
            echo "secrets.SUPABASE_URL is empty, using fallback URL."
            BASE_URL="$SUPABASE_URL_FALLBACK"
          else
            echo "Using SUPABASE_URL from GitHub secrets."
          fi

          # Strip trailing slash if any
          BASE_URL="${BASE_URL%/}"

          # Validate that BASE_URL is a proper http(s) URL
          if ! printf '%s' "$BASE_URL" | grep -Eq '^https?://[^/]+'; then
            echo "ERROR: invalid Supabase base URL: '$BASE_URL'"
            exit 1
          fi

          FUNCTION_URL="$BASE_URL/functions/v1/changelog-from-commits"
          echo "Target endpoint host: $(printf '%s' "$BASE_URL" | sed -E 's#^https?://([^/]+).*#\1#')"

          if [ -z "${CHANGELOG_WEBHOOK_SECRET:-}" ]; then
            echo "ERROR: CHANGELOG_WEBHOOK_SECRET is not set in GitHub secrets."
            exit 1
          fi

          echo "Sending $(printf '%s' "$PAYLOAD" | wc -c) bytes of payload..."

          # Call edge function; capture body + status separately so failures are visible in logs
          HTTP_STATUS=$(curl -sS -o /tmp/changelog_response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: $CHANGELOG_WEBHOOK_SECRET" \
            -d "$PAYLOAD" \
            "$FUNCTION_URL")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/changelog_response.json || true
          echo

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Edge function returned non-2xx status."
            exit 1
          fi
